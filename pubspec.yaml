name: KeepIt
description: "KeepIt — Track it. Keep it. A premium daily weight tracker."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  path_provider: ^2.1.5
  fl_chart: ^0.70.2
  flutter_local_notifications: ^18.0.1
  google_fonts: ^6.2.1
  confetti: ^0.8.0
  csv: ^6.0.0
  file_picker: ^8.1.6
  share_plus: ^10.1.4
  intl: ^0.19.0
  uuid: ^4.5.1
  permission_handler: ^11.3.1
  timezone: ^0.9.4
  flutter_timezone: ^5.0.2
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  isar_generator: ^3.1.0+1
  build_runner: ^2.4.13
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: "ic_keepit"
  ios: true
  image_path: "assets/icon/logo.png"
  min_sdk_android: 21
  remove_alpha_ios: true
